<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: {{ width }} {{ height }};
    margin: 0;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Liberation Sans", "Nimbus Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 8pt;
    line-height: 1.2;
    color: #000;
    width: {{ width }};
    height: {{ height }};
    padding: 4pt;
  }

  .nf-label {
    border: 1pt solid #000;
    padding: 4pt 4pt 2pt 4pt;
    width: 100%;
    height: 100%;
  }

  .nf-title {
    font-size: 13pt;
    font-weight: 900;
    letter-spacing: -0.5pt;
    margin-bottom: 1pt;
  }

  .nf-servings-info {
    font-size: 8pt;
    line-height: 1.3;
    margin-bottom: 2pt;
  }

  .nf-serving-size-row {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 8pt;
  }

  /* Bar rules per FDA Appendix B */
  .nf-thick-bar {
    height: 7pt;
    background: #000;
    margin: 2pt 0;
  }

  .nf-medium-bar {
    height: 3pt;
    background: #000;
    margin: 2pt 0;
  }

  .nf-thin-bar {
    height: 0.5pt;
    background: #000;
    margin: 1pt 0;
  }

  /* Calories section */
  .nf-calories-section {
    margin-bottom: 0;
  }

  .nf-calories-header {
    font-size: 6pt;
    font-weight: 700;
  }

  .nf-calories-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .nf-calories-label {
    font-size: 10pt;
    font-weight: 900;
  }

  .nf-calories-value {
    font-size: 10pt;
    font-weight: 900;
  }

  /* Nutrient table */
  .nf-table {
    width: 100%;
    border-collapse: collapse;
  }

  .nf-table td {
    padding: 1pt 0;
    font-size: 8pt;
    line-height: 1.1;
    border-top: 0.5pt solid #000;
    vertical-align: top;
  }

  .nf-table .nf-no-border td {
    border-top: none;
  }

  .nf-table .nf-name {
    text-align: left;
  }

  .nf-table .nf-amount {
    text-align: left;
    white-space: nowrap;
  }

  .nf-table .nf-dv {
    text-align: right;
    font-weight: 700;
  }

  .nf-bold {
    font-weight: 700;
  }

  .nf-indent {
    padding-left: 16pt !important;
  }

  /* Vitamins/minerals */
  .nf-vitamins-table td {
    font-size: 8pt;
  }

  /* Footnote */
  .nf-footnote {
    font-size: 6pt;
    line-height: 1.2;
    margin-top: 2pt;
  }

  {% block extra_css %}{% endblock %}
</style>
</head>
<body>
  <div class="nf-label">
    {% block label_content %}{% endblock %}
  </div>
</body>
</html>
